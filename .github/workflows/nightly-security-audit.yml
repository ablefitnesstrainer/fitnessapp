name: Nightly Security Audit

on:
  schedule:
    - cron: '0 7 * * *' # Daily 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  nightly-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (prod deps)
        run: npm audit --omit=dev --json > audit-report.json || true

      - name: Open/close tracking issue based on results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const core = require('@actions/core');

            const reportPath = 'audit-report.json';
            if (!fs.existsSync(reportPath)) {
              core.setFailed('audit-report.json was not generated.');
              return;
            }

            let report;
            try {
              report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            } catch (error) {
              core.setFailed(`Failed to parse npm audit report: ${error.message}`);
              return;
            }

            const vuln = report?.metadata?.vulnerabilities || {};
            const counts = {
              critical: Number(vuln.critical || 0),
              high: Number(vuln.high || 0),
              moderate: Number(vuln.moderate || 0),
              low: Number(vuln.low || 0),
              info: Number(vuln.info || 0)
            };

            const total = counts.critical + counts.high + counts.moderate + counts.low + counts.info;
            const issueTitle = 'Nightly security audit: vulnerabilities detected';

            const { owner, repo } = context.repo;
            const list = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });
            const existing = list.data.find((issue) => issue.title === issueTitle);

            const body = [
              `Automated nightly npm audit found vulnerabilities in production dependencies.`,
              '',
              `- Critical: ${counts.critical}`,
              `- High: ${counts.high}`,
              `- Moderate: ${counts.moderate}`,
              `- Low: ${counts.low}`,
              `- Info: ${counts.info}`,
              `- Total: ${total}`,
              '',
              `Workflow run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              '',
              '_This issue is maintained automatically by `.github/workflows/nightly-security-audit.yml`._'
            ].join('\n');

            if (total > 0) {
              if (existing) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body
                });
                core.notice(`Updated existing vulnerability issue #${existing.number}`);
              } else {
                const created = await github.rest.issues.create({
                  owner,
                  repo,
                  title: issueTitle,
                  body
                });
                core.notice(`Created vulnerability issue #${created.data.number}`);
              }

              core.setFailed(`Nightly audit found ${total} vulnerabilities.`);
              return;
            }

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: 'closed'
              });
              core.notice(`Closed vulnerability issue #${existing.number} because no vulnerabilities were found.`);
            } else {
              core.notice('No vulnerabilities found and no open vulnerability issue to close.');
            }
